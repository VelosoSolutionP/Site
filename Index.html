<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloso Solution | Engineering Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --neon: #00f2ff; --bg: #0a0a0a; }
        * { cursor: crosshair; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .cyber-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 242, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .main-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .mega-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .mega-card:hover {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
            transform: translateY(-5px);
        }

        .text-neon { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        
        .btn-action {
            background: var(--neon); color: #000;
            padding: 0.8rem 1.5rem; font-weight: 800; border-radius: 6px;
            text-transform: uppercase; font-size: 10px; letter-spacing: 1px;
            display: inline-block; text-align: center; width: 100%;
        }

        .tag-tech {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; color: var(--neon);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 2px 8px; border-radius: 4px;
        }
    </style>
</head>
<body class="cyber-grid">

    <header class="main-container pt-10">
        <nav class="mega-card flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <div class="text-2xl font-black italic uppercase">VELOSO<span class="text-neon">SOLUTION</span></div>
                <div class="text-[8px] font-mono text-gray-500 tracking-widest">CONTROLE DE OPERAÇÕES</div>
            </div>
            <div class="flex gap-4 items-center">
                <a href="https://www.linkedin.com/in/fabiano-veloso-5512557a/" target="_blank" class="text-neon text-xl"><i class="fa-brands fa-linkedin"></i></a>
                <button onclick="Tawk_API.toggle()" class="btn-action !w-auto">Suporte</button>
            </div>
        </nav>

        <div class="grid lg:grid-cols-2 gap-8 mb-10">
            <div class="mega-card">
                <h1 class="text-5xl font-black mb-6 uppercase italic">Soluções<br><span class="text-neon">Inteligentes</span></h1>
                <p class="text-gray-400 mb-6">Engenharia de ponta para sistemas escaláveis.</p>
                <a href="https://wa.me/5531992929447" target="_blank" class="btn-action !w-auto">Falar no WhatsApp</a>
            </div>
            <div class="mega-card bg-white/5">
                <h3 class="text-neon font-bold mb-4 uppercase text-sm">Core Team</h3>
                <p class="text-sm italic text-gray-300 mb-4">"Prontos para ser o motor da sua próxima entrega."</p>
                <span class="text-[10px] text-gray-500">FABIANO VELOSO // CEO</span>
            </div>
        </div>
    </header>

    <section class="main-container mb-20">
        <div class="grid md:grid-cols-3 gap-6">
            <div class="mega-card flex flex-col justify-between">
                <div>
                    <i class="fa-solid fa-microchip text-2xl text-neon mb-4"></i>
                    <h3 class="font-bold uppercase mb-2">Implantação</h3>
                </div>
                <button onclick="Tawk_API.toggle()" class="btn-action mt-4">Saber Mais</button>
            </div>
            <div class="mega-card flex flex-col justify-between">
                <div>
                    <i class="fa-solid fa-shield-heart text-2xl text-neon mb-4"></i>
                    <h3 class="font-bold uppercase mb-2">Sustentação</h3>
                </div>
                <button onclick="Tawk_API.toggle()" class="btn-action mt-4">Saber Mais</button>
            </div>
            <div class="mega-card flex flex-col justify-between">
                <div>
                    <i class="fa-solid fa-gauge-high text-2xl text-neon mb-4"></i>
                    <h3 class="font-bold uppercase mb-2">Performance</h3>
                </div>
                <button onclick="Tawk_API.toggle()" class="btn-action mt-4">Saber Mais</button>
            </div>
        </div>
    </section>

    <footer class="main-container pb-10">
        <div class="mega-card grid md:grid-cols-2 gap-10">
            <div>
                <h3 class="font-bold mb-4">Contato</h3>
                <p class="text-neon font-bold">(31) 99292-9447</p>
                <p class="text-xs text-gray-500">Contagem - MG</p>
            </div>
            <div class="h-40 rounded-lg overflow-hidden border border-white/10">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3751.13456789!2d-44.1165!3d-19.9234!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDU1JzI0LjIiUyA0NMKwMDYnNTkuNCJX!5e0!3m2!1spt-BR!2sbr!4v1700000000000" 
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </footer>

</body>
</html>
